apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api
    training.k8rvis.io/security-baseline: insecure
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        training.k8rvis.io/security-baseline: insecure
    spec:
      serviceAccountName: default
      automountServiceAccountToken: true
      containers:
        - name: api
          image: ealen/echo-server
          ports:
            - containerPort: 80
              name: http
