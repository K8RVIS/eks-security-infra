apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: team-dev
  name: db-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"] # 조회만 가능
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: db-rb
  namespace: team-dev
subjects:
  - kind: ServiceAccount
    name: db-workload
    namespace: team-dev
roleRef:
  kind: Role
  name: db-secret-reader
  apiGroup: rbac.authorization.k8s.io
