apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      containers:
        - name: api
          env:
            - $patch: replace
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: redis-url
            - name: EXTERNAL_POSTGRES_HOST
              value: reporting-db.training.local
            - name: EXTERNAL_POSTGRES_PORT
              value: "5432"
            - name: EXTERNAL_POSTGRES_DATABASE
              value: reporting
            - name: EXTERNAL_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-user
            - name: EXTERNAL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-password
