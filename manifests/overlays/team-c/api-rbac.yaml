apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: team-c
  name: api-manager
rules:
  - apiGroups: ["apps", ""]
    resources: ["deployments", "pods"]
    verbs: ["patch", "update", "get", "list"] # 재시작 및 설정 변경 목적
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-rb
  namespace: team-c
subjects:
  - kind: ServiceAccount
    name: api-workload
    namespace: team-c
roleRef:
  kind: Role
  name: api-manager
  apiGroup: rbac.authorization.k8s.io
