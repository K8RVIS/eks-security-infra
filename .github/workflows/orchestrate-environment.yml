name: Orchestrate Environment

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Requested operation"
        required: true
        type: choice
        options:
          - start
          - stop
      slack_user_id:
        description: "Slack user ID"
        required: true
        type: string
      namespace:
        description: "Namespace mapped to the Slack user"
        required: true
        type: string
      request_id:
        description: "Unique request identifier"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: environment-orchestration
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: [self-hosted, Linux, X64]
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TERRAFORM_STATE_REGION: ${{ vars.TERRAFORM_STATE_REGION }}
      INFRA_TERRAFORM_STATE_KEY: ${{ vars.INFRA_TERRAFORM_STATE_KEY }}
      PLATFORM_TERRAFORM_STATE_KEY: ${{ vars.PLATFORM_TERRAFORM_STATE_KEY }}
      PLATFORM_INFRA_STATE_BUCKET: ${{ vars.PLATFORM_INFRA_STATE_BUCKET }}
      PLATFORM_INFRA_STATE_REGION: ${{ vars.PLATFORM_INFRA_STATE_REGION }}
      ORCHESTRATION_STATE_BUCKET: ${{ vars.ORCHESTRATION_STATE_BUCKET }}
      ORCHESTRATION_STATE_KEY: ${{ vars.ORCHESTRATION_STATE_KEY }}
      EXPECTED_RUNNER_PUBLIC_IP: 13.125.215.119

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify runner public IP
        run: |
          set -euo pipefail
          runner_public_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          echo "Runner public IP: ${runner_public_ip}"

          if [ "${runner_public_ip}" != "${EXPECTED_RUNNER_PUBLIC_IP}" ]; then
            echo "::error::Runner public IP must be ${EXPECTED_RUNNER_PUBLIC_IP} to reach the EKS API endpoint."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3

      - name: Validate orchestration configuration
        run: |
          set -euo pipefail

          required_vars=(
            AWS_REGION
            AWS_ROLE_TO_ASSUME
            TERRAFORM_STATE_BUCKET
            ORCHESTRATION_STATE_BUCKET
            ORCHESTRATION_STATE_KEY
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for orchestration."
              exit 1
            fi
          done

      - name: Export EKS access user ARNs
        env:
          EKS_ACCESS_USER_ARNS_JSON: ${{ secrets.EKS_ACCESS_USER_ARNS_JSON }}
        run: |
          set -euo pipefail

          eks_access_user_arns="$(
            python - <<'PY'
          import json
          import os
          import sys

          raw = os.environ.get("EKS_ACCESS_USER_ARNS_JSON", "").strip()
          values = {}

          if raw:
              try:
                  values = json.loads(raw)
              except json.JSONDecodeError as exc:
                  print(f"::error::EKS_ACCESS_USER_ARNS_JSON must be a JSON object: {exc}", file=sys.stderr)
                  sys.exit(1)

              if not isinstance(values, dict):
                  print("::error::EKS_ACCESS_USER_ARNS_JSON must be a JSON object mapping names to IAM role/user ARNs.", file=sys.stderr)
                  sys.exit(1)

          role_to_assume = os.environ.get("AWS_ROLE_TO_ASSUME", "").strip()
          if role_to_assume:
              values.setdefault("github_actions", role_to_assume)

          values = {
              str(name): str(arn).strip()
              for name, arn in values.items()
              if str(arn).strip()
          }

          print(f"EKS access entry principal keys: {', '.join(sorted(values)) or '(none)'}", file=sys.stderr)
          print(json.dumps(values, separators=(",", ":")))
          PY
          )"

          {
            echo "TF_VAR_user_iam_arn<<EOF"
            echo "${eks_access_user_arns}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-eks-orchestrator

      - name: Run orchestration
        run: |
          set -euo pipefail
          python scripts/manage_environment.py \
            --operation "${{ github.event.inputs.operation }}" \
            --slack-user-id "${{ github.event.inputs.slack_user_id }}" \
            --namespace "${{ github.event.inputs.namespace }}" \
            --request-id "${{ github.event.inputs.request_id }}"
