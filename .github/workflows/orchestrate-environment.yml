name: Orchestrate Environment

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Requested operation"
        required: true
        type: choice
        options:
          - start
          - stop
      slack_user_id:
        description: "Slack user ID"
        required: true
        type: string
      namespace:
        description: "Namespace mapped to the Slack user"
        required: true
        type: string
      request_id:
        description: "Unique request identifier"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: environment-orchestration
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: [self-hosted, Linux, X64]
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TERRAFORM_STATE_REGION: ${{ vars.TERRAFORM_STATE_REGION }}
      INFRA_TERRAFORM_STATE_KEY: ${{ vars.INFRA_TERRAFORM_STATE_KEY }}
      PLATFORM_TERRAFORM_STATE_KEY: ${{ vars.PLATFORM_TERRAFORM_STATE_KEY }}
      PLATFORM_INFRA_STATE_BUCKET: ${{ vars.PLATFORM_INFRA_STATE_BUCKET }}
      PLATFORM_INFRA_STATE_REGION: ${{ vars.PLATFORM_INFRA_STATE_REGION }}
      ORCHESTRATION_STATE_BUCKET: ${{ vars.ORCHESTRATION_STATE_BUCKET }}
      ORCHESTRATION_STATE_KEY: ${{ vars.ORCHESTRATION_STATE_KEY }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3

      - name: Validate orchestration configuration
        run: |
          set -euo pipefail

          required_vars=(
            AWS_REGION
            AWS_ROLE_TO_ASSUME
            TERRAFORM_STATE_BUCKET
            ORCHESTRATION_STATE_BUCKET
            ORCHESTRATION_STATE_KEY
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for orchestration."
              exit 1
            fi
          done

      - name: Export break-glass monitoring variables
        env:
          BREAK_GLASS_ENABLED: ${{ vars.BREAK_GLASS_ENABLED }}
          BREAK_GLASS_REQUIRE_MFA: ${{ vars.BREAK_GLASS_REQUIRE_MFA }}
          BREAK_GLASS_TRUSTED_PRINCIPAL_ARNS_JSON: ${{ secrets.BREAK_GLASS_TRUSTED_PRINCIPAL_ARNS_JSON }}
          BREAK_GLASS_ALERT_EMAIL_ADDRESSES_JSON: ${{ secrets.BREAK_GLASS_ALERT_EMAIL_ADDRESSES_JSON }}
        run: |
          set -euo pipefail

          python - <<'PY' >> "${GITHUB_ENV}"
          import json
          import os
          import sys

          enabled_raw = os.environ.get("BREAK_GLASS_ENABLED", "").strip().lower()
          enabled = enabled_raw in {"1", "true", "yes", "y"}
          require_mfa_raw = os.environ.get("BREAK_GLASS_REQUIRE_MFA", "").strip().lower()
          require_mfa = require_mfa_raw in {"1", "true", "yes", "y"}

          if not enabled:
              print("TF_VAR_break_glass_enabled=false")
              sys.exit(0)

          def load_json_array(name: str, required: bool) -> list[str]:
              raw = os.environ.get(name, "").strip()
              if not raw:
                  if required:
                      print(f"::error::{name} is required when BREAK_GLASS_ENABLED is true.", file=sys.stderr)
                      sys.exit(1)
                  return []

              try:
                  values = json.loads(raw)
              except json.JSONDecodeError as exc:
                  print(f"::error::{name} must be a JSON array: {exc}", file=sys.stderr)
                  sys.exit(1)

              if not isinstance(values, list) or not all(isinstance(item, str) and item.strip() for item in values):
                  print(f"::error::{name} must be a JSON array of non-empty strings.", file=sys.stderr)
                  sys.exit(1)

              return [item.strip() for item in values]

          trusted_principals = load_json_array("BREAK_GLASS_TRUSTED_PRINCIPAL_ARNS_JSON", required=True)
          alert_emails = load_json_array("BREAK_GLASS_ALERT_EMAIL_ADDRESSES_JSON", required=False)

          print("TF_VAR_break_glass_enabled=true")
          print(f"TF_VAR_break_glass_require_mfa={str(require_mfa).lower()}")
          print(f"TF_VAR_break_glass_trusted_principal_arns={json.dumps(trusted_principals, separators=(',', ':'))}")
          print(f"TF_VAR_break_glass_alert_email_addresses={json.dumps(alert_emails, separators=(',', ':'))}")
          PY

      - name: Export EKS access user ARNs
        env:
          EKS_ACCESS_USER_ARNS_JSON: ${{ secrets.EKS_ACCESS_USER_ARNS_JSON }}
        run: |
          set -euo pipefail

          eks_access_user_arns="$(
            python - <<'PY'
          import json
          import os
          import sys
          from scripts.manage_environment import normalize_eks_access_user_arns

          raw = os.environ.get("EKS_ACCESS_USER_ARNS_JSON", "").strip()
          values = {}

          if raw:
              try:
                  values = json.loads(raw)
              except json.JSONDecodeError as exc:
                  print(f"::error::EKS_ACCESS_USER_ARNS_JSON must be a JSON object: {exc}", file=sys.stderr)
                  sys.exit(1)

              if not isinstance(values, dict):
                  print("::error::EKS_ACCESS_USER_ARNS_JSON must be a JSON object mapping names to IAM role/user ARNs.", file=sys.stderr)
                  sys.exit(1)

          values = normalize_eks_access_user_arns(
              values,
              role_to_assume=os.environ.get("AWS_ROLE_TO_ASSUME", ""),
          )

          print(f"EKS access entry principal keys: {', '.join(sorted(values)) or '(none)'}", file=sys.stderr)
          print(json.dumps(values, separators=(",", ":")))
          PY
          )"

          {
            echo "TF_VAR_user_iam_arn<<EOF"
            echo "${eks_access_user_arns}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-eks-orchestrator

